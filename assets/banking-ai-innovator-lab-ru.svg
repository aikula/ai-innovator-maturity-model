<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <rect width="1600" height="1000" fill="#ffffff"/>
  <text x="90" y="75" font-family="Arial, sans-serif" font-size="44" font-weight="700" fill="#111827">Banking AI-Innovator Lab</text>
  <text x="90" y="118" font-family="Arial, sans-serif" font-size="23" fill="#4b5563">Enterprise-пример применения AI-Innovator</text>

  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#111827"/></marker></defs>

  <g font-family="Arial, sans-serif">
    <rect x="80" y="210" width="260" height="115" rx="18" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <text x="210" y="255" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">Данные</text>
    <text x="210" y="290" text-anchor="middle" font-size="18" fill="#4b5563">CRM, каналы</text>

    <rect x="390" y="210" width="260" height="115" rx="18" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
    <text x="520" y="255" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">Сегменты</text>
    <text x="520" y="290" text-anchor="middle" font-size="18" fill="#4b5563">клиенты и группы</text>

    <rect x="700" y="210" width="260" height="115" rx="18" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="830" y="255" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">Гипотезы</text>
    <text x="830" y="290" text-anchor="middle" font-size="18" fill="#4b5563">офферы и сценарии</text>

    <rect x="1010" y="210" width="260" height="115" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="1140" y="255" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">Модели</text>
    <text x="1140" y="290" text-anchor="middle" font-size="18" fill="#4b5563">экономика и операции</text>

    <rect x="1230" y="455" width="260" height="115" rx="18" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="1360" y="500" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">Сценарии</text>
    <text x="1360" y="535" text-anchor="middle" font-size="18" fill="#4b5563">риски и диапазоны</text>

    <rect x="920" y="700" width="300" height="115" rx="18" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
    <text x="1070" y="745" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">Пилот</text>
    <text x="1070" y="780" text-anchor="middle" font-size="18" fill="#4b5563">проверка</text>

    <rect x="510" y="700" width="300" height="115" rx="18" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
    <text x="660" y="745" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">Обучение</text>
    <text x="660" y="780" text-anchor="middle" font-size="18" fill="#4b5563">прогноз vs факт</text>

    <rect x="100" y="700" width="300" height="115" rx="18" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
    <text x="250" y="745" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">Решение</text>
    <text x="250" y="780" text-anchor="middle" font-size="18" fill="#4b5563">масштаб или правка</text>
  </g>

  <g stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <line x1="340" y1="267" x2="390" y2="267"/>
    <line x1="650" y1="267" x2="700" y2="267"/>
    <line x1="960" y1="267" x2="1010" y2="267"/>
    <path d="M1270 267 C1390 300 1430 380 1360 455"/>
    <path d="M1360 570 C1320 660 1210 705 1220 755"/>
    <line x1="920" y1="757" x2="810" y2="757"/>
    <line x1="510" y1="757" x2="400" y2="757"/>
  </g>

  <rect x="410" y="430" width="780" height="110" rx="20" fill="#111827"/>
  <text x="800" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#ffffff">Пример: новая модель для SME</text>
  <text x="800" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" fill="#d1d5db">от отдельных продуктов к управляемой клиентской системе</text>
</svg>
