<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <rect width="1600" height="1000" fill="#ffffff"/>
  <text x="90" y="70" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#111827">AI-Innovator: Two-Axis Maturity Matrix</text>
  <text x="90" y="112" font-family="Arial, sans-serif" font-size="22" fill="#4b5563">Innovation depth must be matched by validation strictness</text>

  <line x1="210" y1="820" x2="1390" y2="820" stroke="#111827" stroke-width="3"/>
  <line x1="210" y1="820" x2="210" y2="190" stroke="#111827" stroke-width="3"/>
  <polygon points="1390,820 1368,808 1368,832" fill="#111827"/>
  <polygon points="210,190 198,212 222,212" fill="#111827"/>

  <text x="535" y="900" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Strictness of Validation</text>
  <text x="25" y="510" transform="rotate(-90 25,510)" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Depth of Innovation</text>

  <g font-family="Arial, sans-serif" font-size="18" fill="#6b7280">
    <text x="205" y="858">No validation</text>
    <text x="375" y="858">Critique</text>
    <text x="520" y="858">Evidence</text>
    <text x="665" y="858">Strict model</text>
    <text x="840" y="858">Agent simulation</text>
    <text x="1075" y="858">Real test</text>
    <text x="1260" y="858">Self-learning</text>

    <text x="75" y="810">Local</text>
    <text x="70" y="710">Product</text>
    <text x="55" y="610">Operating</text>
    <text x="50" y="510">Commercial</text>
    <text x="40" y="410">Business model</text>
    <text x="60" y="310">Category</text>
    <text x="55" y="210">New game</text>
  </g>

  <g opacity="0.13">
    <rect x="210" y="730" width="1180" height="90" fill="#9ca3af"/>
    <rect x="210" y="620" width="1180" height="110" fill="#60a5fa"/>
    <rect x="210" y="480" width="1180" height="140" fill="#34d399"/>
    <rect x="210" y="330" width="1180" height="150" fill="#f59e0b"/>
    <rect x="210" y="190" width="1180" height="140" fill="#8b5cf6"/>
  </g>

  <circle cx="350" cy="755" r="58" fill="#f3f4f6" stroke="#9ca3af" stroke-width="3"/>
  <text x="320" y="763" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">M0</text>
  <text x="275" y="833" font-family="Arial, sans-serif" font-size="18" fill="#374151">Idea generator</text>

  <circle cx="550" cy="650" r="58" fill="#eef2ff" stroke="#6366f1" stroke-width="3"/>
  <text x="520" y="658" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">M1</text>
  <text x="465" y="728" font-family="Arial, sans-serif" font-size="18" fill="#374151">Evidence collector</text>

  <circle cx="720" cy="550" r="58" fill="#ecfeff" stroke="#06b6d4" stroke-width="3"/>
  <text x="690" y="558" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">M2</text>
  <text x="635" y="628" font-family="Arial, sans-serif" font-size="18" fill="#374151">Hypothesis designer</text>

  <circle cx="890" cy="460" r="58" fill="#f0fdf4" stroke="#22c55e" stroke-width="3"/>
  <text x="860" y="468" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">M3</text>
  <text x="810" y="538" font-family="Arial, sans-serif" font-size="18" fill="#374151">Strict simulation</text>

  <circle cx="1070" cy="360" r="58" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
  <text x="1040" y="368" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">M4</text>
  <text x="970" y="438" font-family="Arial, sans-serif" font-size="18" fill="#374151">Probabilistic simulator</text>

  <circle cx="1225" cy="270" r="58" fill="#fef2f2" stroke="#ef4444" stroke-width="3"/>
  <text x="1195" y="278" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">M5</text>
  <text x="1135" y="348" font-family="Arial, sans-serif" font-size="18" fill="#374151">Self-learning lab</text>

  <circle cx="1320" cy="210" r="58" fill="#faf5ff" stroke="#a855f7" stroke-width="3"/>
  <text x="1290" y="218" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">M6</text>
  <text x="1200" y="155" font-family="Arial, sans-serif" font-size="18" fill="#374151">Business model innovator</text>

  <path d="M 350 755 C 540 710, 615 600, 720 550 S 1000 430, 1070 360 S 1220 265, 1320 210" fill="none" stroke="#111827" stroke-width="4" stroke-dasharray="10 9" opacity="0.5"/>

  <text x="250" y="940" font-family="Arial, sans-serif" font-size="21" fill="#374151">A serious AI-Innovator sits in the upper-right: deep hypotheses validated through evidence, models, experiments, and learning.</text>
</svg>
