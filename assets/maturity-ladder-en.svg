<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect width="1400" height="900" fill="#ffffff"/>
  <text x="70" y="70" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#111827">AI-Innovator Maturity Model v0.1</text>
  <text x="70" y="110" font-family="Arial, sans-serif" font-size="22" fill="#4b5563">From idea generation to self-learning market labs</text>
  <g font-family="Arial, sans-serif">
    <rect x="70" y="170" width="1260" height="78" rx="14" fill="#f3f4f6" stroke="#d1d5db"/>
    <text x="100" y="218" font-size="28" font-weight="700" fill="#111827">M0 Idea Generator</text>
    <text x="440" y="218" font-size="23" fill="#374151">Produces ideas without validation</text>
    <rect x="70" y="260" width="1260" height="78" rx="14" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="100" y="308" font-size="28" font-weight="700" fill="#111827">M1 Market Research Assistant</text>
    <text x="540" y="308" font-size="23" fill="#374151">Collects and structures evidence</text>
    <rect x="70" y="350" width="1260" height="78" rx="14" fill="#ecfeff" stroke="#a5f3fc"/>
    <text x="100" y="398" font-size="28" font-weight="700" fill="#111827">M2 Hypothesis Designer</text>
    <text x="500" y="398" font-size="23" fill="#374151">Converts ideas into testable hypotheses</text>
    <rect x="70" y="440" width="1260" height="78" rx="14" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="100" y="488" font-size="28" font-weight="700" fill="#111827">M3 Simulation-Based Innovator</text>
    <text x="590" y="488" font-size="23" fill="#374151">Tests through strict models</text>
    <rect x="70" y="530" width="1260" height="78" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="100" y="578" font-size="28" font-weight="700" fill="#111827">M4 Probabilistic Market Simulator</text>
    <text x="650" y="578" font-size="23" fill="#374151">Reports distributions, not single forecasts</text>
    <rect x="70" y="620" width="1260" height="78" rx="14" fill="#fef2f2" stroke="#fecaca"/>
    <text x="100" y="668" font-size="28" font-weight="700" fill="#111827">M5 Self-Learning Market Lab</text>
    <text x="585" y="668" font-size="23" fill="#374151">Learns from forecast-vs-actual gaps</text>
    <rect x="70" y="710" width="1260" height="78" rx="14" fill="#faf5ff" stroke="#e9d5ff"/>
    <text x="100" y="758" font-size="28" font-weight="700" fill="#111827">M6 Business Model Innovator</text>
    <text x="560" y="758" font-size="23" fill="#374151">Searches for new categories and value units</text>
  </g>
  <text x="70" y="865" font-family="Arial, sans-serif" font-size="22" fill="#374151">Boundary rule: if the system does not validate hypotheses and learn from results, it is not an AI-Innovator.</text>
</svg>
