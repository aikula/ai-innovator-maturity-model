  <path d="M 350 755 C 540 710, 615 600, 720 550 S 1000 430, 1070 360 S 1220 265, 1320 210" fill="none" stroke="#111827" stroke-width="4" stroke-dasharray="10 9" opacity="0.5"/>

  <text x="250" y="940" font-family="Arial, sans-serif" font-size="21" fill="#374151">Зрелый AI-Innovator находится справа вверху: глубокие гипотезы проходят данные, модели, эксперименты и обучение.</text>
