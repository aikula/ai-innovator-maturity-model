<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <rect width="1600" height="1000" fill="#ffffff"/>
  <text x="90" y="75" font-family="Arial, sans-serif" font-size="44" font-weight="700" fill="#111827">Enterprise-First Adoption</text>
  <text x="90" y="118" font-family="Arial, sans-serif" font-size="23" fill="#4b5563">The first buyers have data, pressure, budgets, and room for pilots</text>

  <rect x="560" y="370" width="480" height="220" rx="26" fill="#111827"/>
  <text x="800" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">AI-Innovator Lab</text>
  <text x="800" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" fill="#d1d5db">evidence → models → tests → learning</text>

  <g font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">
    <rect x="110" y="235" width="300" height="88" rx="16" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/><text x="260" y="290" text-anchor="middle">Finance</text>
    <rect x="110" y="455" width="300" height="88" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="260" y="510" text-anchor="middle">Telco</text>
    <rect x="110" y="675" width="300" height="88" rx="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/><text x="260" y="730" text-anchor="middle">Retail</text>

    <rect x="1190" y="235" width="300" height="88" rx="16" fill="#fff7ed" stroke="#f97316" stroke-width="2"/><text x="1340" y="290" text-anchor="middle">Travel</text>
    <rect x="1190" y="455" width="300" height="88" rx="16" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/><text x="1340" y="510" text-anchor="middle">Energy</text>
    <rect x="1190" y="675" width="300" height="88" rx="16" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/><text x="1340" y="730" text-anchor="middle">Industry</text>
  </g>

  <rect x="515" y="160" width="570" height="80" rx="18" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>
  <text x="800" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#111827">Data + competition + pilot capacity</text>

  <rect x="515" y="730" width="570" height="80" rx="18" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>
  <text x="800" y="780" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#111827">Cheaper strategic learning</text>

  <g stroke="#6b7280" stroke-width="3" opacity="0.75">
    <line x1="410" y1="279" x2="560" y2="415"/><line x1="410" y1="499" x2="560" y2="480"/><line x1="410" y1="719" x2="560" y2="545"/>
    <line x1="1190" y1="279" x2="1040" y2="415"/><line x1="1190" y1="499" x2="1040" y2="480"/><line x1="1190" y1="719" x2="1040" y2="545"/>
    <line x1="800" y1="240" x2="800" y2="370"/><line x1="800" y1="590" x2="800" y2="730"/>
  </g>
